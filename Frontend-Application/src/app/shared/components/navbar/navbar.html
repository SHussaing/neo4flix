<nav class="nav">
  <div class="container nav__inner">
    <a class="nav__brand" routerLink="/movies">Neo4flix</a>

    <div class="nav__links">
      <a routerLink="/movies" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Movies</a>

      @if (authService.isAuthenticated()) {
        <a routerLink="/recommendations" routerLinkActive="is-active">Recommendations</a>
        <a routerLink="/watchlist" routerLinkActive="is-active">Watchlist</a>
        <a routerLink="/ratings" routerLinkActive="is-active">My ratings</a>
      }
    </div>

    <div class="nav__right">
      @if (authService.isAuthenticated()) {
        <div class="nav__user">
          <div class="nav__userName">{{ authService.currentUser()?.name }}</div>
          <button class="btn btn--ghost" (click)="logout()">Logout</button>
        </div>
      } @else {
        <div class="nav__user">
          <a class="btn btn--ghost" routerLink="/login">Sign in</a>
          <a class="btn btn--primary" routerLink="/register">Sign up</a>
        </div>
      }
    </div>
  </div>
</nav>
